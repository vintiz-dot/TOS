<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Life Stages Word Search</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #f3f4f6;
            touch-action: pan-y;
            /* Allow vertical scrolling on body, handled dynamically on grid */
        }

        #grid {
            display: grid;
            grid-template-columns: repeat(24, minmax(12px, 26px));
            gap: 2px;
            /* Prevent text selection and default touch actions to allow custom dragging */
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }

        .cell {
            display: flex;
            align-items: center;
            justify-content: center;
            aspect-ratio: 1 / 1;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            font-size: clamp(10px, 3vw, 16px);
            font-weight: 600;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.15s ease-in-out;
            color: #374151;
            /* gray-700 */
        }

        .cell:hover:not(.selected):not(.found) {
            background-color: #e5e7eb;
            /* gray-200 */
        }

        .cell.selected {
            background-color: #60a5fa;
            /* blue-400 */
            color: white;
            transform: scale(1.1);
            z-index: 10;
        }

        .cell.found {
            background-color: #34d399;
            /* emerald-400 */
            color: white;
        }

        .cell.found.selected {
            background-color: #0ea5e9;
            /* sky-500 (overlapping highlight) */
        }

        .word-item {
            transition: all 0.3s ease;
        }

        .word-item.found {
            text-decoration: line-through;
            color: #9ca3af;
            /* gray-400 */
            text-decoration-thickness: 2px;
        }

        .word-item.found .indicator {
            background-color: #34d399;
            /* emerald-400 */
        }
    </style>
</head>

<body class="min-h-screen flex flex-col items-center justify-center p-4 py-8">

    <div class="max-w-4xl w-full bg-white p-6 md:p-10 rounded-2xl shadow-xl flex flex-col items-center gap-10">

        <!-- Header -->
        <div class="text-center w-full relative">
            <h1 class="text-3xl font-bold text-gray-800 mb-2">Word Search</h1>
            <p class="text-gray-500 text-sm">Find all the hidden words related to the stages of life. Click and drag to
                select.</p>
            <div id="win-message"
                class="hidden absolute inset-0 bg-white/90 flex items-center justify-center z-20 rounded">
                <span class="text-2xl font-bold text-emerald-500 animate-bounce">🎉 You found all the words! 🎉</span>
            </div>
        </div>

        <!-- Puzzle Grid -->
        <div id="grid" class="bg-gray-50 p-2 md:p-4 rounded-xl border border-gray-100 shadow-inner">
            <!-- Grid generated by JS -->
        </div>

        <!-- Word List -->
        <div class="w-full border-t pt-8">
            <div id="word-list"
                class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-5 gap-4 text-center md:text-left text-gray-700 font-medium">
                <!-- Words generated by JS -->
            </div>
        </div>

    </div>

    <script>
        // Data Configuration
        const wordsToFind = [
            { display: "Adolescence", search: "ADOLESCENCE" },
            { display: "Adulthood", search: "ADULTHOOD" },
            { display: "Childhood", search: "CHILDHOOD" },
            { display: "Development", search: "DEVELOPMENT" },
            { display: "Elderly", search: "ELDERLY" },
            { display: "Foetus", search: "FOETUS" },
            { display: "Growth", search: "GROWTH" },
            { display: "Infancy", search: "INFANCY" },
            { display: "Life stages", search: "LIFESTAGES" },
            { display: "Puberty", search: "PUBERTY" }
        ];

        const gridData = [
            "PXVIHTAWCKUJLZHXJJTZWBQH",
            "VGCXHCDFKTEFDNIAEYSREYKP",
            "XRPUFGOWZALOTULXYRYXPJVJ",
            "IYOIAPLSJYDYIIRYUFSRKQCB",
            "PSYBDCEPSYEHFOIFGCJRAXUK",
            "XGHVUNSMFVRYMTNCTANJYTKM",
            "UVAVLCCKPVLUUBFNMNOJWUUL",
            "DKDRTMECVYYZFVARPMLXCRPI",
            "TGUOHWNFNGTDJGNZVUWDOYUF",
            "RNUCODCPNGPTPRCBELTOLTBE",
            "KEQIOZEEVFKFJAYOWDFBPDES",
            "YGSODXRATNADNFFUMWYEJNRT",
            "NNWIDEVELOPMENTBZHECNXTA",
            "HAJHMWKMLVKNJUQFXCSMFOYG",
            "HJVBJHDQLEPBAFODRIEFXKPE",
            "ILTQXACHILDHOODHLLRPPBKS",
            "CZTKKFDGFUGUEEDDIRLHNBXA",
            "RMBNLHHEUNDIQTVJBQGROWTH",
            "OAGWFLUTTVUFEUQRPAMQFADV",
            "UXDWSFUWCYZVSSIINCHHGYKO",
            "TBZNSQADLKCJYZWBJLXVHMOO",
            "CDTDHWLKXWGPBWWYYHGQMMKN",
            "IDJLWHHGEYUVVJKEDYQIQQXP",
            "UIGJEYHNZRQXXPYABWJOZHMZ"
        ];

        // State Management
        const gridEl = document.getElementById('grid');
        const wordListEl = document.getElementById('word-list');
        let foundWordsCount = 0;
        let isDragging = false;
        let startCell = null;
        let endCell = null;
        let selectedCells = [];

        // 1. Initialize DOM Elements
        function initGame() {
            // Render Words List
            wordsToFind.forEach(word => {
                const div = document.createElement('div');
                div.className = 'word-item flex items-center justify-center md:justify-start gap-2 cursor-default';
                div.id = 'word-' + word.search;
                div.innerHTML = `<span class="w-2.5 h-2.5 rounded-full bg-gray-200 indicator shadow-sm"></span> <span>${word.display}</span>`;
                wordListEl.appendChild(div);
            });

            // Render Grid
            gridData.forEach((rowStr, r) => {
                for (let c = 0; c < rowStr.length; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.dataset.row = r;
                    cell.dataset.col = c;
                    cell.textContent = rowStr[c];
                    gridEl.appendChild(cell);
                }
            });
        }

        // 2. Logic & Interactions
        function handleStart(r, c) {
            isDragging = true;
            startCell = { r, c };
            endCell = { r, c };
            updateSelection();
        }

        function handleMove(r, c) {
            if (!isDragging) return;
            endCell = { r, c };
            updateSelection();
        }

        function handleEnd() {
            if (!isDragging) return;
            isDragging = false;
            checkWordMatch();

            // Reset selection state
            startCell = null;
            endCell = null;
            selectedCells = [];
            renderHighlights();
        }

        // Calculates straight or diagonal path from start to end point
        function updateSelection() {
            selectedCells = [];
            let dr = endCell.r - startCell.r;
            let dc = endCell.c - startCell.c;
            let steps = Math.max(Math.abs(dr), Math.abs(dc));

            if (steps === 0) {
                selectedCells.push(getCellEl(startCell.r, startCell.c));
                renderHighlights();
                return;
            }

            let dirR = dr === 0 ? 0 : dr / Math.abs(dr);
            let dirC = dc === 0 ? 0 : dc / Math.abs(dc);

            // Force strict snapping to Horizontal, Vertical, or 45-deg Diagonal
            if (Math.abs(dr) !== Math.abs(dc) && dr !== 0 && dc !== 0) {
                if (Math.abs(dr) > Math.abs(dc)) {
                    dirC = 0; // Snap to vertical
                    steps = Math.abs(dr);
                } else {
                    dirR = 0; // Snap to horizontal
                    steps = Math.abs(dc);
                }
            }

            for (let i = 0; i <= steps; i++) {
                let r = startCell.r + dirR * i;
                let c = startCell.c + dirC * i;
                let el = getCellEl(r, c);
                if (el) selectedCells.push(el);
            }
            renderHighlights();
        }

        function getCellEl(r, c) {
            return document.querySelector(`.cell[data-row="${r}"][data-col="${c}"]`);
        }

        function renderHighlights() {
            document.querySelectorAll('.cell.selected').forEach(el => el.classList.remove('selected'));
            selectedCells.forEach(el => el.classList.add('selected'));
        }

        // Check if current highlight matches any words left
        function checkWordMatch() {
            if (selectedCells.length === 0) return;

            let wordStr = selectedCells.map(el => el.textContent).join('');
            let reversedStr = wordStr.split('').reverse().join('');

            // Match word in either forward or backward direction
            let matchedWord = wordsToFind.find(w => w.search === wordStr || w.search === reversedStr);

            if (matchedWord) {
                const wordUIEl = document.getElementById('word-' + matchedWord.search);
                const isAlreadyFound = wordUIEl.classList.contains('found');

                if (!isAlreadyFound) {
                    // Mark as found in UI List
                    wordUIEl.classList.add('found');

                    // Keep cells permanently highlighted
                    selectedCells.forEach(el => {
                        el.classList.add('found');
                    });

                    // Check for Win condition
                    foundWordsCount++;
                    if (foundWordsCount === wordsToFind.length) {
                        setTimeout(() => {
                            document.getElementById('win-message').classList.remove('hidden');
                        }, 300);
                    }
                }
            }
        }

        // 3. Event Listeners (Mouse)
        gridEl.addEventListener('mousedown', (e) => {
            if (e.target.classList.contains('cell')) {
                handleStart(parseInt(e.target.dataset.row), parseInt(e.target.dataset.col));
            }
        });

        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            if (e.target.classList.contains('cell')) {
                handleMove(parseInt(e.target.dataset.row), parseInt(e.target.dataset.col));
            }
        });

        window.addEventListener('mouseup', () => {
            handleEnd();
        });

        // 4. Event Listeners (Touch)
        gridEl.addEventListener('touchstart', (e) => {
            let touch = e.touches[0];
            let target = document.elementFromPoint(touch.clientX, touch.clientY);
            if (target && target.classList.contains('cell')) {
                e.preventDefault(); // Prevent accidental scrolling
                handleStart(parseInt(target.dataset.row), parseInt(target.dataset.col));
            }
        }, { passive: false });

        gridEl.addEventListener('touchmove', (e) => {
            if (!isDragging) return;
            e.preventDefault(); // Prevent scrolling while dragging inside grid
            let touch = e.touches[0];
            let target = document.elementFromPoint(touch.clientX, touch.clientY);
            if (target && target.classList.contains('cell')) {
                handleMove(parseInt(target.dataset.row), parseInt(target.dataset.col));
            }
        }, { passive: false });

        window.addEventListener('touchend', () => {
            handleEnd();
        });

        // Start App
        initGame();

    </script>
</body>

</html>
